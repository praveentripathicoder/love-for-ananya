<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html>
<head>
<title>For Ananya ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(45deg,#000000,#1a001a,#330033);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
color:white;
text-align:center;
}

h1{
font-size:70px;
color:#ff4d6d;
text-shadow:0 0 20px #ff4d6d,0 0 40px #ff1a4d;
animation: glow 2s infinite alternate;
}

.signature{
font-size:30px;
margin-top:25px;
opacity:0.9;
letter-spacing:2px;
}

@keyframes glow{
from{
text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d;
}
to{
text-shadow:0 0 30px #ff1a4d,0 0 60px #ff1a4d;
}
}

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation: fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>

</head>

<body>

<h1>I Love You<br>Ananya Shahi ❤️</h1>

<div class="signature">Your Praveen Tripathi</div>

<script>

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";
heart.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
